<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | 4K Website</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Profile Page Additional Styles */
        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 32px;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* Profile Sidebar */
        .profile-sidebar {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            padding: 40px 24px;
            text-align: center;
            color: white;
        }

        .profile-avatar {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            cursor: pointer;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #f1f5f9;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border: 4px solid white;
        }

        .avatar-upload {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #2563eb;
            font-size: 1.2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .profile-name-side {
            font-size: 1.5rem;
            margin: 15px 0 5px;
        }

        .profile-email-side {
            font-size: 0.9rem;
            opacity: 0.9;
            word-break: break-all;
        }

        .member-since {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.8rem;
        }

        /* Profile Content */
        .profile-content {
            padding: 40px;
        }

        .profile-section {
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid #e2e8f0;
        }

        .profile-section:last-child {
            border-bottom: none;
        }

        .profile-section h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            margin-bottom: 16px;
            align-items: start;
        }

        .info-label {
            font-weight: 600;
            color: #64748b;
        }

        .info-value {
            color: #1e293b;
        }

        .info-value.editable {
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            width: 100%;
        }

        .info-value.editable:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
        }

        .edit-btn, .save-btn, .cancel-btn {
            background: none;
            border: none;
            color: #2563eb;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .edit-btn:hover {
            background: #eff6ff;
        }

        .save-btn {
            background: #10b981;
            color: white;
        }

        .cancel-btn {
            background: #ef4444;
            color: white;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #2563eb;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }

        /* Modal for password change */
        .password-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .password-modal-content {
            background: white;
            margin: 15% auto;
            padding: 32px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
            .info-row {
                grid-template-columns: 1fr;
                gap: 5px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Toast */
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">🚀 Brand<span>Flow</span></div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="authNavItem"><a href="signup.html" class="btn-small">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>My <span class="gradient-text">Profile</span></h1>
                <p>Manage your account information</p>
            </div>
        </section>

        <div class="profile-container">
            <div class="profile-grid" id="profileGrid">
                <!-- Will be filled by JavaScript -->
            </div>
        </div>

        <!-- Password Change Modal -->
        <div id="passwordModal" class="password-modal">
            <div class="password-modal-content">
                <h3 style="margin-bottom: 20px;">Change Password</h3>
                <form id="changePasswordForm">
                    <input type="password" id="currentPassword" placeholder="Current Password" required style="margin-bottom: 15px;">
                    <input type="password" id="newPassword" placeholder="New Password" required style="margin-bottom: 15px;">
                    <input type="password" id="confirmNewPassword" placeholder="Confirm New Password" required style="margin-bottom: 20px;">
                    <div class="button-group">
                        <button type="submit" class="save-btn" style="padding: 10px 20px;">Update Password</button>
                        <button type="button" class="cancel-btn" onclick="closePasswordModal()" style="padding: 10px 20px;">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>BrandFlow</h4>
                    <p>Creating stunning 4K websites since 2024.</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="gallery.html">Gallery</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div class="footer-section">
                    <h4>Contact</h4>
                    <p>📧 hello@brandflow.com</p>
                    <p>📞 +92 328 4347698</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Current user data
        let currentUser = null;
        let isEditing = false;

        // Show toast notification
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Update navigation bar
        function updateNavForLoggedInUser(firstName, lastName) {
            const authNavItem = document.getElementById('authNavItem');
            if (!authNavItem) return;
            const fullName = `${firstName} ${lastName}`;
            authNavItem.innerHTML = `
                <div class="user-dropdown" style="position: relative; display: inline-block;">
                    <div class="user-name" style="background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; padding: 8px 20px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        👤 ${fullName} ▼
                    </div>
                    <div class="dropdown-content" style="display: none; position: absolute; right: 0; background: white; min-width: 160px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-radius: 16px; z-index: 1; margin-top: 8px;">
                        <a href="profile.html" style="display: block; padding: 12px 16px; color: #1e293b !important; text-decoration: none;">📋 My Profile</a>
                        <a href="#" id="logoutLink" style="display: block; padding: 12px 16px; color: #1e293b !important; text-decoration: none;">🚪 Logout</a>
                    </div>
                </div>
            `;
            
            const dropdown = authNavItem.querySelector('.user-dropdown');
            const dropdownContent = authNavItem.querySelector('.dropdown-content');
            
            if (dropdown && dropdownContent) {
                dropdown.addEventListener('mouseenter', () => dropdownContent.style.display = 'block');
                dropdown.addEventListener('mouseleave', () => dropdownContent.style.display = 'none');
            }
            
            const logoutLink = document.getElementById('logoutLink');
            if (logoutLink) {
                logoutLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('loggedInUser');
                    showToast('Logged out successfully!');
                    setTimeout(() => window.location.href = 'signup.html', 1000);
                });
            }
        }

        // Check login status
        function checkLoginStatus() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (!loggedInUser) {
                showToast('Please login first!', true);
                setTimeout(() => window.location.href = 'signup.html', 1500);
                return false;
            }
            currentUser = JSON.parse(loggedInUser);
            updateNavForLoggedInUser(currentUser.firstName, currentUser.lastName);
            return true;
        }

        // Load profile data from localStorage
        function loadProfileData() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === currentUser.email);
            if (user) {
                currentUser = { ...currentUser, ...user };
                localStorage.setItem('loggedInUser', JSON.stringify(currentUser));
            }
            renderProfile();
        }

        // Save profile data to localStorage
        function saveProfileData(updatedData) {
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === currentUser.email);
            
            if (userIndex !== -1) {
                users[userIndex] = { ...users[userIndex], ...updatedData };
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            currentUser = { ...currentUser, ...updatedData };
            localStorage.setItem('loggedInUser', JSON.stringify(currentUser));
            
            updateNavForLoggedInUser(currentUser.firstName, currentUser.lastName);
            showToast('Profile updated successfully!');
            renderProfile();
        }

        // Render profile UI
        function renderProfile() {
            const profileGrid = document.getElementById('profileGrid');
            const avatarSrc = localStorage.getItem(`avatar_${currentUser.email}`) || null;
            
            profileGrid.innerHTML = `
                <div class="profile-sidebar">
                    <div class="profile-avatar" onclick="document.getElementById('avatarInput').click()">
                        ${avatarSrc ? 
                            `<img src="${avatarSrc}" class="avatar-image" alt="Profile">` : 
                            `<div class="avatar-placeholder">👤</div>`
                        }
                        <div class="avatar-upload">📷</div>
                    </div>
                    <input type="file" id="avatarInput" style="display: none;" accept="image/*" onchange="uploadAvatar(this)">
                    <h2 class="profile-name-side">${currentUser.firstName} ${currentUser.lastName}</h2>
                    <p class="profile-email-side">${currentUser.email}</p>
                    <div class="member-since">
                        <small>Member since: ${new Date(currentUser.registeredAt || Date.now()).toLocaleDateString()}</small>
                    </div>
                </div>
                
                <div class="profile-content">
                    <div class="profile-section">
                        <h3>📋 Personal Information</h3>
                        <div id="personalInfo">
                            ${isEditing ? renderEditForm() : renderViewMode()}
                        </div>
                    </div>
                    
                    <div class="profile-section">
                        <h3>🔐 Security</h3>
                        <div class="info-row">
                            <div class="info-label">Password:</div>
                            <div class="info-value">••••••••</div>
                        </div>
                        <button class="edit-btn" onclick="openPasswordModal()">Change Password</button>
                    </div>
                    
                    <div class="profile-section">
                        <h3>📊 Account Statistics</h3>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number">${Math.floor(Math.random() * 100) + 1}</div>
                                <div class="stat-label">Projects</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${Math.floor(Math.random() * 500) + 50}</div>
                                <div class="stat-label">Points Earned</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${Math.floor(Math.random() * 30) + 1}</div>
                                <div class="stat-label">Days Active</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderViewMode() {
            return `
                <div class="info-row">
                    <div class="info-label">First Name:</div>
                    <div class="info-value">${currentUser.firstName}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Last Name:</div>
                    <div class="info-value">${currentUser.lastName}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Email:</div>
                    <div class="info-value">${currentUser.email}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Phone:</div>
                    <div class="info-value">${currentUser.phone || 'Not provided'}</div>
                </div>
                <button class="edit-btn" onclick="toggleEdit()">✏️ Edit Profile</button>
            `;
        }

        function renderEditForm() {
            return `
                <div class="info-row">
                    <div class="info-label">First Name:</div>
                    <input type="text" id="editFirstName" class="info-value editable" value="${currentUser.firstName}">
                </div>
                <div class="info-row">
                    <div class="info-label">Last Name:</div>
                    <input type="text" id="editLastName" class="info-value editable" value="${currentUser.lastName}">
                </div>
                <div class="info-row">
                    <div class="info-label">Phone:</div>
                    <input type="tel" id="editPhone" class="info-value editable" value="${currentUser.phone || ''}">
                </div>
                <div class="button-group">
                    <button class="save-btn" onclick="saveEdit()">💾 Save Changes</button>
                    <button class="cancel-btn" onclick="cancelEdit()">❌ Cancel</button>
                </div>
            `;
        }

        function toggleEdit() {
            isEditing = true;
            renderProfile();
        }

        function cancelEdit() {
            isEditing = false;
            renderProfile();
        }

        function saveEdit() {
            const newFirstName = document.getElementById('editFirstName')?.value.trim();
            const newLastName = document.getElementById('editLastName')?.value.trim();
            const newPhone = document.getElementById('editPhone')?.value.trim();
            
            if (!newFirstName || !newLastName) {
                showToast('First name and last name are required!', true);
                return;
            }
            
            saveProfileData({
                firstName: newFirstName,
                lastName: newLastName,
                phone: newPhone
            });
            
            isEditing = false;
        }

        // Avatar upload
        function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (!file.type.startsWith('image/')) {
                    showToast('Please select an image file!', true);
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const avatarData = e.target.result;
                    localStorage.setItem(`avatar_${currentUser.email}`, avatarData);
                    showToast('Profile picture updated!');
                    renderProfile();
                };
                reader.readAsDataURL(file);
            }
        }

        // Password modal functions
        function openPasswordModal() {
            document.getElementById('passwordModal').style.display = 'block';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('changePasswordForm').reset();
        }

        // Change password
        const changePasswordForm = document.getElementById('changePasswordForm');
        if (changePasswordForm) {
            changePasswordForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const currentPwd = document.getElementById('currentPassword').value;
                const newPwd = document.getElementById('newPassword').value;
                const confirmPwd = document.getElementById('confirmNewPassword').value;
                
                // For demo, just check if new password is valid
                if (newPwd.length < 4) {
                    showToast('New password must be at least 4 characters!', true);
                    return;
                }
                
                if (newPwd !== confirmPwd) {
                    showToast('New passwords do not match!', true);
                    return;
                }
                
                showToast('Password changed successfully!');
                closePasswordModal();
            });
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('passwordModal');
            if (event.target === modal) {
                closePasswordModal();
            }
        }

        // Initialize profile page
        if (checkLoginStatus()) {
            loadProfileData();
        }
    </script>
</body>
</html>
